<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- A dependency graph: central node with three connected child nodes -->
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2d6b57"/>
      <stop offset="100%" stop-color="#1e4b3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f4b267"/>
      <stop offset="100%" stop-color="#f08a24"/>
    </linearGradient>
  </defs>
  <!-- Edges -->
  <line x1="18" y1="16" x2="10" y2="32" stroke="url(#fg)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="16" x2="24" y2="32" stroke="url(#fg)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="16" x2="38" y2="32" stroke="url(#fg)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Root node (top center) -->
  <circle cx="24" cy="12" r="7" fill="url(#accent)" stroke="url(#fg)" stroke-width="2"/>
  <!-- Child nodes -->
  <circle cx="10" cy="36" r="5.5" fill="url(#fg)" stroke="url(#accent)" stroke-width="1.5"/>
  <circle cx="24" cy="36" r="5.5" fill="url(#fg)" stroke="url(#accent)" stroke-width="1.5"/>
  <circle cx="38" cy="36" r="5.5" fill="url(#fg)" stroke="url(#accent)" stroke-width="1.5"/>
</svg>