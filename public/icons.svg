    <circle cx="19" cy="6" r="2.5" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="19" cy="18" r="2.5" stroke="currentColor" stroke-width="1.5"/>
    <path d="M7.5 11 16.5 7M7.5 13l9 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

