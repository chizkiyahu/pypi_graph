  <symbol id="zoom-out-icon" viewBox="0 0 24 24" fill="none">
    <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/>
    <path d="m16.5 16.5 4.5 4.5M8 11h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

