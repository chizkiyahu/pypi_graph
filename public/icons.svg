    <path d="m12 2 9 4.5v11L12 22l-9-4.5v-11L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M12 22V11.5M12 11.5 3 7m9 4.5 9-4.5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="m7.5 4.25 9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

