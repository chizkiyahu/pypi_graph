  <symbol id="pypi-icon" viewBox="0 0 24 24" fill="none">
    <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.5"/>
    <path d="M8 8h3a2.5 2.5 0 0 1 0 5H8V8Zm0 5v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="m14 13 2-5 2 5m-1.5-7v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
